career-profile:
    title: About
    summary: |
      I’m a Enthusiastic, self-motivated and talented guy with some experience about 2+ years in fields
      including Machine Learning, Backend development, Data Analysis.
      I love to challenge my problem solving and creativity skills to find solutions for real world problems. I’m
      eager to learn new things, also a fast learner and I think learning is one of the most important skills every
      human borned to learn, and my mistakes are my biggest teachers.
      I found my talent and interest in programming and interacting with data in college and that was where I
      started from by writing scientific programs and embedded systems programming from that age.
      I love to work with data, processing them, pulling meaningful results to make strategic decisions,
      automating projects to run as stand-alone apps.
